name: Build dependencies & push to artifactory

on:
  push:
  workflow_dispatch:

jobs:

  build:
    name: ${{ matrix.os }} - ${{ matrix.profile }}
    strategy:
      matrix:
        include:
          - os: ubuntu-24.04
            profile_build: profile_linux
            profile_host: profile_linux
          - os: windows-2025-vs2026
            profile_build: profile_win
            profile_host: profile_win
          - os: macos-26
            profile_build: profile_mac_arm
            profile_host: profile_mac
          - os: macos-26
            profile_build: profile_mac_arm
            profile_host: profile_mac_arm
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
          cache: 'pip'
      - name: Install Conan
        run: pip install -r requirements.txt
      - name: Configure Conan remotes
        shell: bash
        env:
          ARTIFACTORY_USER: ${{ secrets.ARTIFACTORY_USER }}
          ARTIFACTORY_TOKEN: ${{ secrets.ARTIFACTORY_TOKEN }}
        run: |
          conan remote disable conancenter
          conan remote add swift https://artifactory.swift-project.org/artifactory/api/conan/conan-local
          conan remote login swift "$ARTIFACTORY_USER" --password "$ARTIFACTORY_TOKEN"
      - name: Build libraries
        shell: bash
        run: |
          conan install . -pr:b=${{ matrix.profile_build }} -pr:h=${{ matrix.profile_host }} --build=missing
      - name: Upload libraries
        if: github.ref == 'refs/heads/main'
        shell: bash
        run: |
          conan upload "*" -r swift --confirm
